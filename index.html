<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BRAIN BLAST</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#08080f;color:#fff;
  font-family:'Segoe UI',system-ui,sans-serif;
  overflow:hidden;height:100svh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  user-select:none;-webkit-user-select:none;
}
canvas#bg{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
#game{position:relative;z-index:10;width:min(520px,96vw);display:flex;flex-direction:column;gap:11px;padding:8px;}
#hud{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:14px;}
#level{background:linear-gradient(135deg,#5500ff,#cc00ff);border-radius:20px;
  padding:5px 14px;font-size:0.75em;font-weight:800;letter-spacing:2px;
  box-shadow:0 0 18px rgba(170,0,255,0.5);}
#lives{font-size:1.25em;letter-spacing:2px;}
#prog{font-size:1em;font-weight:800;color:#00e5ff;letter-spacing:1px;}
#box{background:rgba(255,255,255,0.04);border:2px solid rgba(0,229,255,0.3);border-radius:22px;
  padding:18px 14px;min-height:160px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  transition:border-color 0.3s,box-shadow 0.3s;
  box-shadow:0 0 22px rgba(0,229,255,0.08) inset;}
#box.ok{border-color:#00ff88;box-shadow:0 0 40px rgba(0,255,136,0.5) inset;}
#box.bad{border-color:#ff4466;box-shadow:0 0 40px rgba(255,68,102,0.5) inset;}
#type-lbl{font-size:0.68em;text-transform:uppercase;letter-spacing:3px;color:rgba(255,255,255,0.45);}
#text-q{font-size:1.3em;font-weight:800;line-height:1.4;text-align:center;color:#fff;}
#main-cv{display:block;border-radius:12px;background:#0d0d22;}
#vis-answers{display:none;grid-template-columns:1fr 1fr;gap:10px;}
#vis-answers.on{display:grid;}
.vbtn{background:rgba(255,255,255,0.04);border:2px solid rgba(255,255,255,0.15);
  border-radius:14px;padding:6px;cursor:pointer;transition:all 0.12s;
  -webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center;
  aspect-ratio:1;}
.vbtn canvas{border-radius:8px;display:block;width:100%;height:100%;}
.vbtn:hover{background:rgba(0,229,255,0.12);border-color:rgba(0,229,255,0.6);}
.vbtn.ok{background:rgba(0,255,136,0.2);border-color:#00ff88;box-shadow:0 0 22px rgba(0,255,136,0.5);}
.vbtn.bad{background:rgba(255,68,102,0.2);border-color:#ff4466;box-shadow:0 0 22px rgba(255,68,102,0.5);}
#text-answers{display:none;grid-template-columns:1fr 1fr;gap:10px;}
#text-answers.on{display:grid;}
.tbtn{background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.15);
  color:#fff;font-size:1.05em;font-weight:700;padding:14px 8px;border-radius:14px;
  cursor:pointer;transition:all 0.12s;-webkit-tap-highlight-color:transparent;
  min-height:54px;}
.tbtn:hover,.tbtn:focus{background:rgba(0,229,255,0.15);border-color:rgba(0,229,255,0.55);outline:none;}
.tbtn.ok{background:rgba(0,255,136,0.2);border-color:#00ff88;color:#00ff88;box-shadow:0 0 18px rgba(0,255,136,0.4);}
.tbtn.bad{background:rgba(255,68,102,0.2);border-color:#ff4466;color:#ff4466;box-shadow:0 0 18px rgba(255,68,102,0.4);}
#dpad{display:none;grid-template-columns:1fr 1fr 1fr;gap:8px;max-width:240px;margin:0 auto;}
#dpad.on{display:grid;}
.dbtn{background:rgba(255,255,255,0.06);border:2px solid rgba(0,229,255,0.4);
  color:#00e5ff;font-size:1.5em;font-weight:800;padding:18px 0;border-radius:14px;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:all 0.08s;}
.dbtn:active{background:rgba(0,229,255,0.25);transform:scale(0.95);}
.dbtn.spacer{visibility:hidden;border:none;background:none;}
.screen{display:none;position:fixed;inset:0;z-index:50;background:rgba(8,8,15,0.96);
  flex-direction:column;align-items:center;justify-content:center;gap:20px;text-align:center;padding:24px;}
.screen.on{display:flex;}
.screen h1{font-size:clamp(2.4em,10vw,4.4em);font-weight:900;
  background:linear-gradient(135deg,#00e5ff,#aa00ff);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:4px;
  text-shadow:0 0 60px rgba(170,0,255,0.4);}
.screen p{color:rgba(255,255,255,0.65);font-size:1.05em;max-width:400px;line-height:1.6;}
.go-btn{background:linear-gradient(135deg,#0088ff,#aa00ff);border:none;color:#fff;
  font-size:1.25em;font-weight:800;padding:15px 44px;border-radius:16px;cursor:pointer;
  letter-spacing:1px;box-shadow:0 4px 28px rgba(170,0,255,0.5);transition:transform 0.12s,box-shadow 0.12s;}
.go-btn:hover{transform:scale(1.05);box-shadow:0 6px 36px rgba(170,0,255,0.7);}
#go-stats{color:rgba(255,255,255,0.7);font-size:1.05em;line-height:2;}
#go-stats b{color:#00e5ff;font-size:1.3em;}
#flash{position:fixed;inset:0;z-index:30;pointer-events:none;
  display:flex;align-items:center;justify-content:center;
  font-size:5em;font-weight:900;opacity:0;transition:opacity 0.12s;}
#levelpop{position:fixed;top:35%;left:50%;transform:translateX(-50%) scale(0.5);z-index:31;
  pointer-events:none;font-size:2.2em;font-weight:900;
  background:linear-gradient(135deg,#aa00ff,#00e5ff);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  opacity:0;transition:opacity 0.2s,transform 0.3s;letter-spacing:3px;}
.badge-row{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:420px;}
.badge{background:rgba(255,255,255,0.08);border-radius:8px;padding:4px 10px;
  font-size:0.72em;color:rgba(255,255,255,0.55);letter-spacing:1px;}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px) rotate(-1deg)}
  40%{transform:translateX(6px) rotate(1deg)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.shake{animation:shake 0.3s;}
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div id="game">
  <div id="hud">
    <div id="level">LVL 1</div>
    <div id="prog">0/5</div>
    <div id="lives">❤️❤️❤️</div>
  </div>
  <div id="box">
    <div id="type-lbl">CHALLENGE</div>
    <div id="text-q" style="display:none"></div>
    <canvas id="main-cv" width="320" height="320"></canvas>
  </div>
  <div id="vis-answers">
    <button class="vbtn" data-i="0"><canvas width="120" height="120"></canvas></button>
    <button class="vbtn" data-i="1"><canvas width="120" height="120"></canvas></button>
    <button class="vbtn" data-i="2"><canvas width="120" height="120"></canvas></button>
    <button class="vbtn" data-i="3"><canvas width="120" height="120"></canvas></button>
  </div>
  <div id="text-answers">
    <button class="tbtn" data-i="0"></button>
    <button class="tbtn" data-i="1"></button>
    <button class="tbtn" data-i="2"></button>
    <button class="tbtn" data-i="3"></button>
  </div>
  <div id="dpad">
    <button class="dbtn spacer"></button>
    <button class="dbtn" data-dir="N">▲</button>
    <button class="dbtn spacer"></button>
    <button class="dbtn" data-dir="W">◀</button>
    <button class="dbtn spacer"></button>
    <button class="dbtn" data-dir="E">▶</button>
    <button class="dbtn spacer"></button>
    <button class="dbtn" data-dir="S">▼</button>
    <button class="dbtn spacer"></button>
  </div>
</div>

<div id="start-screen" class="screen on">
  <h1>BRAIN BLAST</h1>
  <p>Visual patterns · Mazes · Logic<br>No timer. Just your brain.</p>
  <div class="badge-row">
    <span class="badge">SHAPE MATRIX</span>
    <span class="badge">COUNT</span>
    <span class="badge">PATTERN</span>
    <span class="badge">ROTATION</span>
    <span class="badge">MIRROR</span>
    <span class="badge">MAZE</span>
    <span class="badge">ODD ONE</span>
    <span class="badge">ANALOGY</span>
    <span class="badge">LOGIC</span>
  </div>
  <button class="go-btn" id="start-btn">START</button>
</div>

<div id="game-over" class="screen">
  <h1>GAME OVER</h1>
  <div id="go-stats"></div>
  <button class="go-btn" id="restart-btn">PLAY AGAIN</button>
</div>

<div id="flash"></div>
<div id="levelpop">LEVEL UP</div>

<script>
// ============ HELPERS ============
const R=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const pick=a=>a[0|Math.random()*a.length];
function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=R(0,i);[b[i],b[j]]=[b[j],b[i]];}return b;}

const SHAPES=['circle','square','triangle','diamond','hex'];
const COLORS=['#ff4466','#00ccff','#00ff88','#ffaa00','#cc66ff'];
const COLOR_NAMES={'#ff4466':'red','#00ccff':'cyan','#00ff88':'green','#ffaa00':'orange','#cc66ff':'purple'};

function rr(ctx,x,y,w,h,r=8){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

function clrCv(ctx,w,h){ctx.fillStyle='#0d0d22';ctx.fillRect(0,0,w,h);}

function drawSh(ctx,sh,cx,cy,r,col,style='solid'){
  ctx.save();ctx.beginPath();
  if(sh==='circle') ctx.arc(cx,cy,r,0,Math.PI*2);
  else if(sh==='square'){const s=r*1.6;ctx.rect(cx-s/2,cy-s/2,s,s);}
  else if(sh==='triangle'){ctx.moveTo(cx,cy-r);ctx.lineTo(cx+r*.87,cy+r*.5);ctx.lineTo(cx-r*.87,cy+r*.5);ctx.closePath();}
  else if(sh==='diamond'){ctx.moveTo(cx,cy-r);ctx.lineTo(cx+r*.75,cy);ctx.lineTo(cx,cy+r);ctx.lineTo(cx-r*.75,cy);ctx.closePath();}
  else{for(let i=0;i<6;i++){const a=i*Math.PI/3-Math.PI/6;if(i===0)ctx.moveTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);else ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);}ctx.closePath();}
  if(style==='solid'){ctx.fillStyle=col;ctx.shadowColor=col;ctx.shadowBlur=12;ctx.fill();}
  else if(style==='ring'){ctx.strokeStyle=col;ctx.lineWidth=r*.4;ctx.stroke();}
  ctx.restore();
}

function drawDots(ctx,n,cx,cy,r,col){
  const pts={1:[[0,0]],2:[[-r*.5,0],[r*.5,0]],3:[[0,-r*.5],[r*.5,r*.35],[-r*.5,r*.35]],4:[[-r*.45,-r*.45],[r*.45,-r*.45],[-r*.45,r*.45],[r*.45,r*.45]],5:[[0,-r*.55],[r*.5,-r*.2],[-r*.5,-r*.2],[r*.35,r*.45],[-r*.35,r*.45]],6:[[-r*.5,-r*.4],[0,-r*.4],[r*.5,-r*.4],[-r*.5,r*.4],[0,r*.4],[r*.5,r*.4]]}[Math.min(n,6)]||[[0,0]];
  for(const[dx,dy]of pts){
    ctx.beginPath();ctx.arc(cx+dx,cy+dy,r*.22,0,Math.PI*2);
    ctx.fillStyle=col;ctx.shadowColor=col;ctx.shadowBlur=8;ctx.fill();
  }
  ctx.shadowBlur=0;
}

function drawQ(ctx,cx,cy,r){
  ctx.save();
  ctx.fillStyle='rgba(255,255,255,0.08)';
  rr(ctx,cx-r,cy-r,r*2,r*2,10);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=2;
  ctx.setLineDash([5,5]);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#00e5ff';ctx.font='bold '+(r*1.2)+'px sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor='#00e5ff';ctx.shadowBlur=12;
  ctx.fillText('?',cx,cy);ctx.shadowBlur=0;
  ctx.restore();
}

// ============ AUDIO ============
let actx=null;
function ensureAudio(){if(!actx){try{actx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}}
function beep(freq,dur=0.1,type='sine',vol=0.18){
  if(!actx)return;
  const o=actx.createOscillator(),g=actx.createGain();
  o.type=type;o.frequency.value=freq;
  o.connect(g);g.connect(actx.destination);
  g.gain.setValueAtTime(vol,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+dur);
  o.start();o.stop(actx.currentTime+dur);
}
function sndOk(){beep(660,0.1,'sine');setTimeout(()=>beep(880,0.12,'sine'),60);}
function sndBad(){beep(220,0.2,'sawtooth',0.15);}
function sndLvl(){beep(523,0.1);setTimeout(()=>beep(659,0.1),80);setTimeout(()=>beep(784,0.15),160);setTimeout(()=>beep(1047,0.2),240);}
function sndClick(){beep(440,0.04,'square',0.08);}

// ============ BACKGROUND PARTICLES ============
const bg=document.getElementById('bg'),bgx=bg.getContext('2d');
let bgParts=[];
function resizeBG(){bg.width=innerWidth;bg.height=innerHeight;}
resizeBG();addEventListener('resize',resizeBG);
function initParts(){
  bgParts=[];
  for(let i=0;i<50;i++){
    bgParts.push({x:Math.random()*bg.width,y:Math.random()*bg.height,
      vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,
      r:Math.random()*2+0.5,c:pick(['#00e5ff','#aa00ff','#00ff88','#ff4466']),
      a:Math.random()*0.5+0.2});
  }
}
initParts();
let burstParts=[];
function burst(x,y,col,n=20){
  for(let i=0;i<n;i++){
    burstParts.push({x,y,vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8,
      r:Math.random()*3+1,c:col,life:1});
  }
}
function bgLoop(){
  bgx.fillStyle='rgba(8,8,15,0.18)';bgx.fillRect(0,0,bg.width,bg.height);
  for(const p of bgParts){
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0||p.x>bg.width)p.vx*=-1;
    if(p.y<0||p.y>bg.height)p.vy*=-1;
    bgx.beginPath();bgx.arc(p.x,p.y,p.r,0,Math.PI*2);
    bgx.fillStyle=p.c;bgx.globalAlpha=p.a;
    bgx.shadowColor=p.c;bgx.shadowBlur=8;bgx.fill();
  }
  bgx.globalAlpha=1;bgx.shadowBlur=0;
  burstParts=burstParts.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life-=0.02;
    if(p.life<=0)return false;
    bgx.beginPath();bgx.arc(p.x,p.y,p.r,0,Math.PI*2);
    bgx.fillStyle=p.c;bgx.globalAlpha=p.life;
    bgx.shadowColor=p.c;bgx.shadowBlur=10;bgx.fill();
    return true;
  });
  bgx.globalAlpha=1;bgx.shadowBlur=0;
  requestAnimationFrame(bgLoop);
}
bgLoop();

// ============ GAME STATE ============
const ST={lives:3,level:1,progress:0,solved:0,attempts:0,playing:false,recentTypes:[]};
const mainCv=document.getElementById('main-cv');
const mainCx=mainCv.getContext('2d');
const visAns=document.getElementById('vis-answers');
const txtAns=document.getElementById('text-answers');
const dpad=document.getElementById('dpad');
const textQ=document.getElementById('text-q');
const typeLbl=document.getElementById('type-lbl');
const livesEl=document.getElementById('lives');
const levelEl=document.getElementById('level');
const progEl=document.getElementById('prog');
const box=document.getElementById('box');
const flash=document.getElementById('flash');
const lvlpop=document.getElementById('levelpop');

let currentChallenge=null;
let mazeRAF=null;
let acceptingInput=true;

function setSize(w,h){mainCv.width=w;mainCv.height=h;mainCv.style.width=w+'px';mainCv.style.height=h+'px';}

function updateHUD(){
  livesEl.textContent='❤️'.repeat(ST.lives)+'🖤'.repeat(3-ST.lives);
  levelEl.textContent='LVL '+ST.level;
  progEl.textContent=ST.progress+'/5';
}

// ============ CHALLENGE: SHAPE MATRIX ============
function genShapeMatrix(){
  const shapes=shuf(SHAPES).slice(0,3);
  const colors=shuf(COLORS).slice(0,3);
  // Latin square layout
  const grid=[];
  for(let r=0;r<3;r++){
    const row=[];
    for(let c=0;c<3;c++){
      row.push({sh:shapes[(r+c)%3],col:colors[(r*2+c)%3]});
    }
    grid.push(row);
  }
  const correct=grid[2][2];
  // make distractors
  const choices=[{sh:correct.sh,col:correct.col}];
  const wrongPool=[];
  for(const sh of shapes)for(const col of colors){
    if(!(sh===correct.sh&&col===correct.col))wrongPool.push({sh,col});
  }
  const wrongs=shuf(wrongPool).slice(0,3);
  for(const w of wrongs)choices.push(w);
  const shuffled=shuf(choices);
  const answer=shuffled.findIndex(c=>c.sh===correct.sh&&c.col===correct.col);

  return {
    mode:'vis',label:'SHAPE MATRIX',
    draw(ctx,w,h){
      clrCv(ctx,w,h);
      const pad=12,cell=(w-pad*2)/3;
      for(let r=0;r<3;r++)for(let c=0;c<3;c++){
        const x=pad+c*cell,y=pad+r*cell;
        ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=1;
        ctx.strokeRect(x+2,y+2,cell-4,cell-4);
        const cx=x+cell/2,cy=y+cell/2;
        if(r===2&&c===2){drawQ(ctx,cx,cy,cell*.32);}
        else{drawSh(ctx,grid[r][c].sh,cx,cy,cell*.32,grid[r][c].col);}
      }
    },
    answer,
    choices:shuffled.map(ch=>({draw(ctx,w,h){clrCv(ctx,w,h);drawSh(ctx,ch.sh,w/2,h/2,Math.min(w,h)*.32,ch.col);}}))
  };
}

// ============ CHALLENGE: COUNT MATRIX ============
function genCountMatrix(){
  const grid=[];
  for(let r=0;r<3;r++){const row=[];for(let c=0;c<3;c++)row.push((r+c)%3+1);grid.push(row);}
  const correct=grid[2][2];
  const choices=shuf([correct,...shuf([1,2,3,4,5,6].filter(n=>n!==correct)).slice(0,3)]);
  const answer=choices.indexOf(correct);
  const dotCol=pick(['#00e5ff','#00ff88','#ffaa00']);
  return {
    mode:'txt+draw',label:'COUNT THE DOTS',
    text:'How many dots fit the pattern?',
    draw(ctx,w,h){
      clrCv(ctx,w,h);
      const pad=12,cell=(w-pad*2)/3;
      for(let r=0;r<3;r++)for(let c=0;c<3;c++){
        const x=pad+c*cell,y=pad+r*cell;
        ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=1;
        ctx.strokeRect(x+2,y+2,cell-4,cell-4);
        const cx=x+cell/2,cy=y+cell/2;
        if(r===2&&c===2){drawQ(ctx,cx,cy,cell*.3);}
        else{drawDots(ctx,grid[r][c],cx,cy,cell*.35,dotCol);}
      }
    },
    answer,
    choices:choices.map(n=>({text:String(n)}))
  };
}

// ============ CHALLENGE: COLOR PATTERN ============
function genColorPattern(){
  const pal=shuf(COLORS).slice(0,3);
  const grid=[];
  for(let i=0;i<9;i++)grid.push(pal[i%3]);
  const correct=grid[8];
  const choices=shuf([correct,...shuf(COLORS.filter(c=>c!==correct)).slice(0,3)]);
  const answer=choices.indexOf(correct);
  return {
    mode:'vis',label:'COLOR PATTERN',
    draw(ctx,w,h){
      clrCv(ctx,w,h);
      const pad=12,cell=(w-pad*2)/3;
      for(let i=0;i<9;i++){
        const r=Math.floor(i/3),c=i%3;
        const x=pad+c*cell+6,y=pad+r*cell+6,sz=cell-12;
        if(i===8){drawQ(ctx,x+sz/2,y+sz/2,sz*.42);}
        else{
          ctx.save();ctx.fillStyle=grid[i];ctx.shadowColor=grid[i];ctx.shadowBlur=14;
          rr(ctx,x,y,sz,sz,8);ctx.fill();ctx.restore();
        }
      }
    },
    answer,
    choices:choices.map(col=>({draw(ctx,w,h){
      clrCv(ctx,w,h);
      ctx.save();ctx.fillStyle=col;ctx.shadowColor=col;ctx.shadowBlur=16;
      rr(ctx,w*.2,h*.2,w*.6,h*.6,10);ctx.fill();ctx.restore();
    }}))
  };
}

// ============ CHALLENGE: ROTATION ============
function genRotation(){
  const step=pick([45,60,90,120])*Math.PI/180;
  const start=pick([0,45,90,135])*Math.PI/180;
  const correct=start+step*3;
  // distractors at different angles
  const wrongs=[];
  const offs=shuf([Math.PI/2,Math.PI,Math.PI*1.5,Math.PI/3,Math.PI*2/3]);
  for(let i=0;i<3;i++)wrongs.push(correct+offs[i]);
  const all=shuf([correct,...wrongs]);
  const answer=all.indexOf(correct);
  function drawArrow(ctx,cx,cy,r,ang,col){
    ctx.save();ctx.translate(cx,cy);ctx.rotate(ang);
    ctx.beginPath();
    ctx.moveTo(0,-r);ctx.lineTo(r*.6,r*.5);ctx.lineTo(0,r*.2);ctx.lineTo(-r*.6,r*.5);ctx.closePath();
    ctx.fillStyle=col;ctx.shadowColor=col;ctx.shadowBlur=14;ctx.fill();
    ctx.restore();
  }
  const col='#00e5ff';
  return {
    mode:'vis',label:'ROTATION SEQUENCE',
    draw(ctx,w,h){
      clrCv(ctx,w,h);
      const pad=14,cell=(w-pad*2)/4;
      for(let i=0;i<4;i++){
        const x=pad+i*cell,y=h/2-cell/2;
        ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=1;
        ctx.strokeRect(x+2,y+2,cell-4,cell-4);
        const cx=x+cell/2,cy=y+cell/2;
        if(i===3){drawQ(ctx,cx,cy,cell*.3);}
        else{drawArrow(ctx,cx,cy,cell*.32,start+step*i,col);}
      }
      // arrow connectors
      ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='bold 20px sans-serif';ctx.textAlign='center';
      for(let i=0;i<3;i++){ctx.fillText('→',pad+(i+1)*cell-cell*.5+cell*.5-cell/2,h/2+4);}
    },
    answer,
    choices:all.map(ang=>({draw(ctx,w,h){clrCv(ctx,w,h);drawArrow(ctx,w/2,h/2,Math.min(w,h)*.32,ang,col);}}))
  };
}

// ============ CHALLENGE: MIRROR ============
function genMirror(){
  const shapes=[
    [[-20,-30],[10,-30],[10,-10],[20,-10],[20,30],[-20,0]],
    [[0,-30],[25,0],[10,0],[10,30],[-10,30],[-10,10],[-25,10]],
    [[-25,-25],[25,-10],[15,5],[20,25],[-10,20],[-20,0]],
    [[-30,-20],[20,-25],[10,0],[25,15],[-5,25],[-25,5]]
  ];
  const pts=pick(shapes);
  const col=pick(['#00e5ff','#ff4466','#00ff88','#ffaa00']);
  function drawPoly(ctx,cx,cy,scale,points,c){
    ctx.save();ctx.translate(cx,cy);ctx.scale(scale,scale);
    ctx.beginPath();
    for(let i=0;i<points.length;i++){
      if(i===0)ctx.moveTo(points[i][0],points[i][1]);
      else ctx.lineTo(points[i][0],points[i][1]);
    }
    ctx.closePath();
    ctx.fillStyle=c;ctx.shadowColor=c;ctx.shadowBlur=14;ctx.fill();
    ctx.restore();
  }
  // variants
  const variants=[
    {pts:pts.map(p=>[-p[0],p[1]]),label:'h-mirror'},  // correct
    {pts:pts.map(p=>[p[0],-p[1]]),label:'v-flip'},
    {pts:pts.map(p=>[-p[0],-p[1]]),label:'both'},
    {pts:pts.slice(),label:'same'}
  ];
  const shuffled=shuf(variants);
  const answer=shuffled.findIndex(v=>v.label==='h-mirror');
  return {
    mode:'vis',label:'MIRROR IMAGE',
    draw(ctx,w,h){
      clrCv(ctx,w,h);
      const scale=Math.min(w,h)/120;
      drawPoly(ctx,w*.28,h/2,scale,pts,col);
      // dashed mirror line
      ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=2;ctx.setLineDash([6,6]);
      ctx.beginPath();ctx.moveTo(w/2,12);ctx.lineTo(w/2,h-12);ctx.stroke();ctx.setLineDash([]);
      drawQ(ctx,w*.72,h/2,Math.min(w,h)*.18);
    },
    answer,
    choices:shuffled.map(v=>({draw(ctx,w,h){clrCv(ctx,w,h);drawPoly(ctx,w/2,h/2,Math.min(w,h)/130,v.pts,col);}}))
  };
}

// ============ CHALLENGE: MAZE ============
function buildMaze(size){
  const g=Array.from({length:size},()=>Array.from({length:size},()=>({v:false,N:true,S:true,E:true,W:true})));
  const opp={N:'S',S:'N',E:'W',W:'E'};
  const d={N:[-1,0],S:[1,0],E:[0,1],W:[0,-1]};
  function carve(r,c){
    g[r][c].v=true;
    for(const[dir,[dr,dc]]of shuf(Object.entries(d))){
      const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<size&&nc>=0&&nc<size&&!g[nr][nc].v){
        g[r][c][dir]=false;g[nr][nc][opp[dir]]=false;carve(nr,nc);
      }
    }
  }
  carve(0,0);return g;
}

function genMaze(){
  const lv=ST.level;
  const size=lv<4?7:(lv<7?9:11);
  const grid=buildMaze(size);
  const state={
    grid,size,
    player:{r:0,c:0},
    exit:{r:size-1,c:size-1},
    solved:false,
    move(dir){
      if(state.solved)return;
      const cell=grid[state.player.r][state.player.c];
      if(cell[dir])return;
      const d={N:[-1,0],S:[1,0],E:[0,1],W:[0,-1]}[dir];
      state.player.r+=d[0];state.player.c+=d[1];
      sndClick();
      if(state.player.r===state.exit.r&&state.player.c===state.exit.c){
        state.solved=true;
        // auto-correct
        setTimeout(()=>{if(currentChallenge===c)handleResult(true);},150);
      }
    },
    isSolved(){return state.solved;}
  };
  const c={
    mode:'maze',label:'MAZE — FIND THE STAR',
    state,
    draw(ctx,w,h){
      clrCv(ctx,w,h);
      const pad=10,cs=(Math.min(w,h)-pad*2)/size;
      // walls
      ctx.strokeStyle='#00ccff';ctx.lineWidth=2;
      ctx.shadowColor='#00ccff';ctx.shadowBlur=6;
      for(let r=0;r<size;r++)for(let c=0;c<size;c++){
        const x=pad+c*cs,y=pad+r*cs;
        const cell=grid[r][c];
        ctx.beginPath();
        if(cell.N){ctx.moveTo(x,y);ctx.lineTo(x+cs,y);}
        if(cell.S){ctx.moveTo(x,y+cs);ctx.lineTo(x+cs,y+cs);}
        if(cell.E){ctx.moveTo(x+cs,y);ctx.lineTo(x+cs,y+cs);}
        if(cell.W){ctx.moveTo(x,y);ctx.lineTo(x,y+cs);}
        ctx.stroke();
      }
      ctx.shadowBlur=0;
      // exit star
      const ex=pad+state.exit.c*cs+cs/2, ey=pad+state.exit.r*cs+cs/2;
      ctx.fillStyle='#00ff88';ctx.shadowColor='#00ff88';ctx.shadowBlur=14;
      ctx.font='bold '+(cs*.7)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('★',ex,ey);ctx.shadowBlur=0;
      // player
      const px=pad+state.player.c*cs+cs/2, py=pad+state.player.r*cs+cs/2;
      const grad=ctx.createRadialGradient(px,py,0,px,py,cs*.6);
      grad.addColorStop(0,'rgba(255,68,170,0.8)');
      grad.addColorStop(1,'rgba(255,68,170,0)');
      ctx.fillStyle=grad;
      ctx.beginPath();ctx.arc(px,py,cs*.6,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ff4466';ctx.shadowColor='#ff4466';ctx.shadowBlur=14;
      ctx.beginPath();ctx.arc(px,py,cs*.28,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
    }
  };
  return c;
}

// ============ CHALLENGE: ODD VISUAL ============
function genOddVisual(){
  const sh=pick(SHAPES);
  const col=pick(COLORS);
  const oddPos=R(0,8);
  let oddSh=sh,oddCol=col;
  if(Math.random()<0.5){oddSh=pick(SHAPES.filter(s=>s!==sh));}
  else{oddCol=pick(COLORS.filter(c=>c!==col));}
  const oddNum=oddPos+1;
  // 4 choices: oddNum + 3 wrong
  const wrongs=shuf([1,2,3,4,5,6,7,8,9].filter(n=>n!==oddNum)).slice(0,3);
  const choices=shuf([oddNum,...wrongs]);
  const answer=choices.indexOf(oddNum);
  return {
    mode:'txt+draw',label:'ODD ONE OUT',
    text:'Which number is different?',
    draw(ctx,w,h){
      clrCv(ctx,w,h);
      const pad=12,cell=(w-pad*2)/3;
      for(let i=0;i<9;i++){
        const r=Math.floor(i/3),c=i%3;
        const x=pad+c*cell,y=pad+r*cell;
        ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=1;
        ctx.strokeRect(x+2,y+2,cell-4,cell-4);
        const cx=x+cell/2,cy=y+cell/2;
        if(i===oddPos)drawSh(ctx,oddSh,cx,cy,cell*.3,oddCol);
        else drawSh(ctx,sh,cx,cy,cell*.3,col);
        ctx.fillStyle='rgba(255,255,255,0.4)';
        ctx.font='bold 11px sans-serif';ctx.textAlign='left';ctx.textBaseline='top';
        ctx.fillText(String(i+1),x+6,y+5);
      }
    },
    answer,
    choices:choices.map(n=>({text:String(n)}))
  };
}

// ============ CHALLENGE POOL ============
function getPool(){
  const lv=ST.level;
  const base=['shapeMatrix','colorPattern','rotation','maze','textOdd','analogy'];
  if(lv>=2)base.push('countMatrix','logic','oddVisual','mirror');
  if(lv>=4){base.push('maze','maze','shapeMatrix','countMatrix');}
  if(lv>=6){base.push('maze','colorPattern','rotation');}
  return base;
}

const GENS={
  shapeMatrix:genShapeMatrix,
  countMatrix:genCountMatrix,
  colorPattern:genColorPattern,
  rotation:genRotation,
  mirror:genMirror,
  maze:genMaze,
  oddVisual:genOddVisual,
  analogy:genAnalogy,
  textOdd:genTextOdd,
  logic:genLogic
};

function pickType(){
  const pool=getPool();
  for(let tries=0;tries<20;tries++){
    const t=pick(pool);
    const r=ST.recentTypes;
    if(r.length>=2&&r[r.length-1]===t&&r[r.length-2]===t)continue;
    return t;
  }
  return pick(pool);
}

// ============ RENDER CHALLENGE ============
function nextChallenge(){
  if(mazeRAF){cancelAnimationFrame(mazeRAF);mazeRAF=null;}
  acceptingInput=true;
  const type=pickType();
  ST.recentTypes.push(type);
  if(ST.recentTypes.length>5)ST.recentTypes.shift();
  currentChallenge=GENS[type]();
  renderChallenge();
}

function renderChallenge(){
  const c=currentChallenge;
  typeLbl.textContent=c.label;
  // reset UI
  box.classList.remove('ok','bad','shake');
  visAns.classList.remove('on');
  txtAns.classList.remove('on');
  dpad.classList.remove('on');
  textQ.style.display='none';
  mainCv.style.display='none';
  // clear button states
  document.querySelectorAll('.vbtn,.tbtn').forEach(b=>b.classList.remove('ok','bad'));

  if(c.mode==='vis'){
    mainCv.style.display='block';
    setSize(320,320);
    c.draw(mainCx,320,320);
    visAns.classList.add('on');
    document.querySelectorAll('#vis-answers .vbtn').forEach((btn,i)=>{
      const cv=btn.querySelector('canvas');
      const cx=cv.getContext('2d');
      cv.width=120;cv.height=120;
      c.choices[i].draw(cx,120,120);
    });
  } else if(c.mode==='txt'){
    textQ.style.display='block';
    textQ.textContent=c.text;
    mainCv.style.display='none';
    txtAns.classList.add('on');
    document.querySelectorAll('#text-answers .tbtn').forEach((btn,i)=>{
      btn.textContent=c.choices[i].text;
    });
  } else if(c.mode==='txt+draw'){
    textQ.style.display='block';
    textQ.textContent=c.text;
    mainCv.style.display='block';
    setSize(300,300);
    c.draw(mainCx,300,300);
    txtAns.classList.add('on');
    document.querySelectorAll('#text-answers .tbtn').forEach((btn,i)=>{
      btn.textContent=c.choices[i].text;
    });
  } else if(c.mode==='maze'){
    mainCv.style.display='block';
    const sz=Math.min(340,window.innerWidth-40);
    setSize(sz,sz);
    dpad.classList.add('on');
    function loop(){
      if(currentChallenge!==c)return;
      c.draw(mainCx,sz,sz);
      mazeRAF=requestAnimationFrame(loop);
    }
    loop();
  }
}

// ============ HANDLE ANSWER ============
function handleResult(correct){
  if(!acceptingInput)return;
  acceptingInput=false;
  if(correct){
    box.classList.add('ok');
    flashText('✓','#00ff88');
    sndOk();
    const rect=mainCv.getBoundingClientRect();
    burst(rect.left+rect.width/2,rect.top+rect.height/2,'#00ff88',30);
    ST.solved++;ST.attempts++;
    ST.progress++;
    if(ST.progress>=5){
      ST.progress=0;ST.level++;
      setTimeout(levelUp,400);
    }
  } else {
    box.classList.add('bad','shake');
    flashText('✗','#ff4466');
    sndBad();
    ST.lives--;ST.attempts++;
    if(ST.lives<=0){setTimeout(gameOver,800);updateHUD();return;}
  }
  updateHUD();
  setTimeout(()=>{if(ST.lives>0)nextChallenge();},900);
}

function levelUp(){
  lvlpop.textContent='LEVEL '+ST.level;
  lvlpop.style.opacity='1';
  lvlpop.style.transform='translateX(-50%) scale(1)';
  sndLvl();
  burst(window.innerWidth/2,window.innerHeight/2,'#aa00ff',60);
  burst(window.innerWidth/2,window.innerHeight/2,'#00e5ff',40);
  setTimeout(()=>{
    lvlpop.style.opacity='0';
    lvlpop.style.transform='translateX(-50%) scale(0.5)';
  },1200);
}

function flashText(txt,col){
  flash.textContent=txt;flash.style.color=col;
  flash.style.textShadow='0 0 40px '+col;
  flash.style.opacity='1';
  setTimeout(()=>{flash.style.opacity='0';},400);
}

// ============ GAME OVER ============
function gameOver(){
  ST.playing=false;
  const acc=ST.attempts>0?Math.round(ST.solved/ST.attempts*100):0;
  document.getElementById('go-stats').innerHTML=
    'Challenges solved: <b>'+ST.solved+'</b><br>'+
    'Level reached: <b>'+ST.level+'</b><br>'+
    'Accuracy: <b>'+acc+'%</b>';
  document.getElementById('game-over').classList.add('on');
}

function startGame(){
  ensureAudio();
  ST.lives=3;ST.level=1;ST.progress=0;ST.solved=0;ST.attempts=0;ST.recentTypes=[];
  ST.playing=true;
  updateHUD();
  document.getElementById('start-screen').classList.remove('on');
  document.getElementById('game-over').classList.remove('on');
  nextChallenge();
}

// ============ EVENT WIRING ============
document.getElementById('start-btn').addEventListener('click',startGame);
document.getElementById('restart-btn').addEventListener('click',startGame);

document.querySelectorAll('#vis-answers .vbtn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    if(!acceptingInput||!currentChallenge)return;
    const i=+btn.dataset.i;
    const ok=i===currentChallenge.answer;
    btn.classList.add(ok?'ok':'bad');
    if(!ok){
      // also highlight correct
      document.querySelectorAll('#vis-answers .vbtn')[currentChallenge.answer].classList.add('ok');
    }
    handleResult(ok);
  });
});

document.querySelectorAll('#text-answers .tbtn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    if(!acceptingInput||!currentChallenge)return;
    const i=+btn.dataset.i;
    const ok=i===currentChallenge.answer;
    btn.classList.add(ok?'ok':'bad');
    if(!ok){
      document.querySelectorAll('#text-answers .tbtn')[currentChallenge.answer].classList.add('ok');
    }
    handleResult(ok);
  });
});

function dpadMove(dir){
  if(!currentChallenge||currentChallenge.mode!=='maze')return;
  currentChallenge.state.move(dir);
}

document.querySelectorAll('.dbtn[data-dir]').forEach(btn=>{
  const dir=btn.dataset.dir;
  btn.addEventListener('click',()=>dpadMove(dir));
  btn.addEventListener('touchstart',e=>{e.preventDefault();dpadMove(dir);},{passive:false});
});

addEventListener('keydown',e=>{
  if(!ST.playing||!currentChallenge)return;
  if(currentChallenge.mode!=='maze')return;
  const k=e.key.toLowerCase();
  let dir=null;
  if(k==='arrowup'||k==='w')dir='N';
  else if(k==='arrowdown'||k==='s')dir='S';
  else if(k==='arrowleft'||k==='a')dir='W';
  else if(k==='arrowright'||k==='d')dir='E';
  if(dir){e.preventDefault();dpadMove(dir);}
});

// prevent context menu on long touch
document.addEventListener('contextmenu',e=>e.preventDefault());
</script>
